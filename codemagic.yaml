# Codemagic CI/CD Configuration for Tutormeter
# Documentation: https://docs.codemagic.io/yaml/yaml/

workflows:

  # ──────────────────────────────────────────
  # Development Build (on push to dev/main)
  # ──────────────────────────────────────────
  ios-dev-build:
    name: iOS Dev Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
        - pattern: develop
        - pattern: 'feature/*'
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Build archive (no signing)
        script: |
          xcodebuild archive \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  # ──────────────────────────────────────────
  # TestFlight Release (on tag 'release/*')
  # ──────────────────────────────────────────
  ios-testflight:
    name: iOS TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - appstore
        - ios_signing
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'release/*'
        - pattern: 'beta/*'
      cancel_previous_builds: false
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Set build number from Codemagic
        script: |
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
             CODE_SIGN_IDENTITY="" \
             CODE_SIGNING_REQUIRED=NO \
             CODE_SIGNING_ALLOWED=NO
      - name: Ensure provisioning profile exists
        script: |
          python3 -c "
          import os,json,time,base64,subprocess,sys
          key_id=os.environ['APP_STORE_CONNECT_KEY_ID']
          issuer=os.environ['APP_STORE_CONNECT_ISSUER_ID']
          key=os.environ['APP_STORE_CONNECT_PRIVATE_KEY']
          bundle='com.tutormeter.app'

          # Write key to temp file
          kf='/tmp/apikey.p8'
          with open(kf,'w') as f: f.write(key)

          def jwt():
              h=base64.urlsafe_b64encode(json.dumps({'alg':'ES256','kid':key_id,'typ':'JWT'}).encode()).decode().rstrip('=')
              p=base64.urlsafe_b64encode(json.dumps({'iss':issuer,'iat':int(time.time()),'exp':int(time.time())+600,'aud':'appstoreconnect-v1'}).encode()).decode().rstrip('=')
              si=f'{h}.{p}'
              r=subprocess.run(['openssl','dgst','-sha256','-sign',kf],input=si.encode(),capture_output=True)
              s=base64.urlsafe_b64encode(r.stdout).decode().rstrip('=')
              return f'{si}.{s}'

          def api(path,method='GET',data=None):
              t=jwt()
              c=['curl','-s','-H',f'Authorization: Bearer {t}']
              if data: c+=['-X',method,'-H','Content-Type: application/json','-d',json.dumps(data)]
              c.append(f'https://api.appstoreconnect.apple.com/v1{path}')
              r=subprocess.run(c,capture_output=True,text=True)
              return json.loads(r.stdout) if r.stdout else {}

          # Get bundle ID
          r=api(f'/bundleIds?filter[identifier]={bundle}')
          bid=r.get('data',[{}])[0].get('id') if r.get('data') else None
          if not bid:
              print(f'ERROR: Bundle ID {bundle} not found in App Store Connect')
              sys.exit(0)  # Don't fail the build - let signing handle it

          # Get distribution cert
          r=api('/certificates?filter[certificateType]=IOS_DISTRIBUTION&limit=1')
          cid=r.get('data',[{}])[0].get('id') if r.get('data') else None

          # Check/create profile
          r=api(f'/profiles?filter[name]=Tutormeter%20CI&filter[profileType]=IOS_APP_STORE')
          pid=r.get('data',[{}])[0].get('id') if r.get('data') else None

          if pid:
              print(f'Profile exists: {pid}')
          elif bid and cid:
              r=api('/profiles','POST',{'data':{'type':'profiles','attributes':{'name':'Tutormeter CI','profileType':'IOS_APP_STORE'},'relationships':{'bundleId':{'data':{'type':'bundleIds','id':bid}},'certificates':{'data':[{'type':'certificates','id':cid}]}}}})
              pid=r.get('data',{}).get('id')
              print(f'Profile created: {pid or \"FAILED\"}')
          else:
              print(f'Cannot create profile: bid={bid}, cid={cid}')

          # Download and install
          if pid:
              r=api(f'/profiles/{pid}')
              pc=r.get('data',{}).get('attributes',{}).get('profileContent')
              pu=r.get('data',{}).get('attributes',{}).get('uuid')
              if pc and pu:
                  os.makedirs(os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles'),exist_ok=True)
                  with open(os.path.expanduser(f'~/Library/MobileDevice/Provisioning Profiles/{pu}.mobileprovision'),'wb') as f:
                      f.write(base64.b64decode(pc))
                  print(f'Profile installed: {pu}')
          os.unlink(kf)
          "
      - name: Build and sign archive (App Store API key)
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/authkey.p8
          xcodebuild archive \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -archivePath build/ios/archive/Tutormeter.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyPath /tmp/authkey.p8
    artifacts:
      - build/ios/archive/Tutormeter.xcarchive
      - TestResults.xcresult
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Tutormeter Internal Testers
        submit_to_app_store: false
        # App Store compliance:
        # - Encryption: No (no network transmission)
        # - IDFA: No (no ads or tracking)
      email:
        recipients:
          - CHANGE_ME@example.com  # ← Replace with your email
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────
  # Pull Request Validation (PR checks only)
  # ──────────────────────────────────────────
  ios-pr-check:
    name: iOS PR Check
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: "16.0"
      vars:
        XCODE_PROJECT: Tutormeter.xcodeproj
        XCODE_SCHEME: Tutormeter
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml
      - name: Run unit tests
        script: |
          xcodebuild test \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Check for warnings
        script: |
          xcodebuild clean build \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES 2>&1 | tee build.log
          echo "Build completed with warnings treated as errors"
